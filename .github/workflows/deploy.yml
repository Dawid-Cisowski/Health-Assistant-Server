name: Deploy to Cloud Run

on:
  push:
    branches: [master]
  workflow_dispatch:

env:
  PROJECT_ID: health-assistant-477621
  REGION: europe-central2
  SERVICE: health-assistant-event-collector
  REGISTRY: europe-central2-docker.pkg.dev/health-assistant-477621/health-assistant-event-collector

jobs:
  deploy:
    runs-on: ubuntu-latest
    permissions:
      contents: read

    steps:
      - uses: actions/checkout@v4

      - name: Authenticate to Google Cloud
        uses: google-github-actions/auth@v2
        with:
          credentials_json: '${{ secrets.GCP_SA_KEY }}'

      - name: Set up Cloud SDK
        uses: google-github-actions/setup-gcloud@v2

      - name: Configure Docker for Artifact Registry
        run: gcloud auth configure-docker europe-central2-docker.pkg.dev --quiet

      - name: Build and push Docker image
        run: |
          IMAGE="${REGISTRY}/${SERVICE}:${{ github.sha }}"
          docker build -t "${IMAGE}" -t "${REGISTRY}/${SERVICE}:latest" .
          docker push "${IMAGE}"
          docker push "${REGISTRY}/${SERVICE}:latest"

      - name: Deploy to Cloud Run
        run: |
          gcloud run deploy "${SERVICE}" \
            --image="${REGISTRY}/${SERVICE}:${{ github.sha }}" \
            --region="${REGION}" \
            --platform=managed \
            --min-instances=0 \
            --cpu-boost \
            --allow-unauthenticated=false \
            --no-traffic || true

          # Route traffic to new revision
          gcloud run services update-traffic "${SERVICE}" \
            --region="${REGION}" \
            --to-latest
