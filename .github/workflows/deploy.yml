name: Deploy Native Image

on:
  push:
    branches: [master]

# ============================================================
# WYMAGANE SECRETS W GITHUB REPO SETTINGS:
#   GCP_SA_KEY        — Service Account JSON z prawami:
#                       roles/run.admin, roles/artifactregistry.writer,
#                       roles/iam.serviceAccountUser
#
# WYMAGANE VARIABLES W GITHUB REPO SETTINGS:
#   GCP_PROJECT_ID    — np. my-project-123456
#   GCP_REGION        — np. europe-central2  (default)
#   CLOUD_RUN_SERVICE — np. health-assistant (default)
#   AR_REPOSITORY     — np. health-assistant (default)
# ============================================================

env:
  GCP_PROJECT_ID: ${{ vars.GCP_PROJECT_ID || 'health-assistant-477621' }}
  GCP_REGION: ${{ vars.GCP_REGION || 'europe-central2' }}
  CLOUD_RUN_SERVICE: ${{ vars.CLOUD_RUN_SERVICE || 'health-assistant-event-collector' }}
  AR_REPOSITORY: ${{ vars.AR_REPOSITORY || 'health-assistant-event-collector' }}

jobs:
  build-and-deploy:
    runs-on: ubuntu-latest

    steps:
      - uses: actions/checkout@v4

      # Krok 1: GraalVM 25 CE — tylko dla native-image binary (NIE jako JAVA_HOME)
      # Gradle 8.x + Kotlin DSL nie parsuje wersji "25.0.2" → Gradle musi używać Java 21
      - name: Set up GraalVM CE 25 (native-image only)
        uses: graalvm/setup-graalvm@v1
        with:
          java-version: '25'
          distribution: 'graalvm-community'
          github-token: ${{ secrets.GITHUB_TOKEN }}
          set-java-home: 'false'

      # Krok 2: Java 21 jako JAVA_HOME dla Gradle
      - name: Set up JDK 21 for Gradle
        uses: actions/setup-java@v4
        with:
          java-version: '21'
          distribution: 'temurin'
          cache: 'gradle'

      - name: Grant execute permission for gradlew
        run: chmod +x gradlew

      # Gradle używa Java 21, native-image używa GraalVM 25 przez GRAALVM_HOME
      - name: Build native image
        run: ./gradlew nativeCompile --no-daemon -x test -x spotbugsMain -x pmdMain
        env:
          GRADLE_OPTS: '-Dorg.gradle.jvmargs=-Xmx2g -Dorg.gradle.workers.max=1'

      # GCP_SA_KEY przechowywane jako base64 (unika problemów z \n w private key)
      - name: Authenticate to Google Cloud
        run: |
          echo "${{ secrets.GCP_SA_KEY }}" | base64 --decode > "$RUNNER_TEMP/sa_key.json"
          gcloud auth activate-service-account --key-file="$RUNNER_TEMP/sa_key.json"
          gcloud config set project ${{ env.GCP_PROJECT_ID }}
          rm "$RUNNER_TEMP/sa_key.json"

      - name: Configure Docker for Artifact Registry
        run: gcloud auth configure-docker ${{ env.GCP_REGION }}-docker.pkg.dev --quiet

      - name: Build and push Docker image
        run: |
          IMAGE="${{ env.GCP_REGION }}-docker.pkg.dev/${{ env.GCP_PROJECT_ID }}/${{ env.AR_REPOSITORY }}/health-assistant:${{ github.sha }}"
          IMAGE_LATEST="${{ env.GCP_REGION }}-docker.pkg.dev/${{ env.GCP_PROJECT_ID }}/${{ env.AR_REPOSITORY }}/health-assistant:latest"

          docker build -f Dockerfile.native-runtime -t "$IMAGE" -t "$IMAGE_LATEST" .
          docker push "$IMAGE"
          docker push "$IMAGE_LATEST"

          echo "IMAGE=$IMAGE" >> $GITHUB_ENV

      - name: Deploy to Cloud Run
        run: |
          gcloud run deploy ${{ env.CLOUD_RUN_SERVICE }} \
            --image "${{ env.IMAGE }}" \
            --region ${{ env.GCP_REGION }} \
            --min-instances=0 \
            --max-instances=10 \
            --memory=512Mi \
            --cpu=1 \
            --concurrency=80 \
            --cpu-boost \
            --port=8080 \
            --quiet
