name: Deploy to Cloud Run

on:
  push:
    branches: [master]
  workflow_dispatch:

# ============================================================
# WYMAGANE SECRETS W GITHUB REPO SETTINGS:
#   GCP_SA_KEY        — base64-encoded Service Account JSON z prawami:
#                       roles/run.admin, roles/artifactregistry.writer,
#                       roles/iam.serviceAccountUser
#
# WYMAGANE VARIABLES W GITHUB REPO SETTINGS (opcjonalne, mają defaults):
#   GCP_PROJECT_ID    — np. my-project-123456
#   GCP_REGION        — np. europe-central2
#   CLOUD_RUN_SERVICE — np. health-assistant-event-collector
#   AR_REPOSITORY     — np. health-assistant-event-collector
# ============================================================

env:
  GCP_PROJECT_ID: ${{ vars.GCP_PROJECT_ID || 'health-assistant-477621' }}
  GCP_REGION: ${{ vars.GCP_REGION || 'europe-central2' }}
  CLOUD_RUN_SERVICE: ${{ vars.CLOUD_RUN_SERVICE || 'health-assistant-event-collector' }}
  AR_REPOSITORY: ${{ vars.AR_REPOSITORY || 'health-assistant-event-collector' }}

jobs:
  deploy:
    runs-on: ubuntu-latest
    permissions:
      contents: read

    steps:
      - uses: actions/checkout@v4

      # GCP_SA_KEY przechowywane jako base64 (unika problemów z \n w private key)
      - name: Authenticate to Google Cloud
        run: |
          echo "${{ secrets.GCP_SA_KEY }}" | base64 --decode > "$RUNNER_TEMP/sa_key.json"
          gcloud auth activate-service-account --key-file="$RUNNER_TEMP/sa_key.json"
          gcloud config set project ${{ env.GCP_PROJECT_ID }}
          rm "$RUNNER_TEMP/sa_key.json"

      - name: Configure Docker for Artifact Registry
        run: gcloud auth configure-docker ${{ env.GCP_REGION }}-docker.pkg.dev --quiet

      - name: Build and push Docker image
        run: |
          IMAGE="${{ env.GCP_REGION }}-docker.pkg.dev/${{ env.GCP_PROJECT_ID }}/${{ env.AR_REPOSITORY }}/health-assistant:${{ github.sha }}"
          IMAGE_LATEST="${{ env.GCP_REGION }}-docker.pkg.dev/${{ env.GCP_PROJECT_ID }}/${{ env.AR_REPOSITORY }}/health-assistant:latest"

          docker build -t "$IMAGE" -t "$IMAGE_LATEST" .
          docker push "$IMAGE"
          docker push "$IMAGE_LATEST"

          echo "IMAGE=$IMAGE" >> $GITHUB_ENV

      - name: Deploy to Oracle VM
        uses: appleboy/ssh-action@v1
        with:
          host: ${{ secrets.ORACLE_VM_IP }}
          username: ubuntu
          key: ${{ secrets.ORACLE_SSH_KEY }}
          script: |
            cd ~/health-assistant
            docker-compose pull
            docker-compose up -d
